limit_req_zone $binary_remote_addr zone=pos_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=pos_login:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=pos_conn:10m;

upstream ztech_pos_api {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 127.0.0.1:8080;
    server_name pos.example.com;
    client_max_body_size 6m;
    server_tokens off;

    location = /api/auth/login {
        limit_req zone=pos_login burst=3 nodelay;
        proxy_pass http://ztech_pos_api;
        include proxy_params;
    }

    location /api/ {
        limit_req zone=pos_api burst=30 nodelay;
        limit_conn pos_conn 30;
        proxy_connect_timeout 3s;
        proxy_send_timeout 15s;
        proxy_read_timeout 30s;
        proxy_pass http://ztech_pos_api;
        include proxy_params;
    }

    location /uploads/ {
        proxy_cache_valid 200 7d;
        proxy_pass http://ztech_pos_api;
        include proxy_params;
    }
}

